name: '${name}'
version: '${version}'
main: '${main}'

authors:
  - Drak

depend:
  - BukkitOfUtils

softdepend:
  - Chunky

api-version: '1.16'

commands:
  managegame:
    description: Manage the speedrun game
    usage: /managegame <start|stop>
    permission: furyspeedrunning.manage
  playas:
    description: Set your role for the speedrun
    usage: /playas <player|spectator>
  heal:
    description: Heal yourself or a player
    usage: /heal (player)
    permission: furyspeedrunning.admin
  tppos:
    description: Teleport to coordinates
    usage: /tppos <x> <y> <z> (<yaw> <pitch>)
    permission: furyspeedrunning.admin
  tphere:
    description: Teleport a player to you
    usage: /tphere <player>
    permission: furyspeedrunning.admin
  top:
    description: Teleport to the highest block
    usage: /top
    permission: furyspeedrunning.admin
  jump:
    description: Teleport to the block you are looking at
    usage: /jump
    permission: furyspeedrunning.admin
  center:
    description: Center on the block you are standing on
    usage: /center
    permission: furyspeedrunning.admin
  setlobby:
    description: Set the lobby spawn location
    usage: /setlobby
    permission: furyspeedrunning.manage
  lobby:
    description: Teleport to the lobby
    usage: /lobby
  timer:
    description: Start or pause the speedrun timer
    usage: /timer
    permission: furyspeedrun.admin.timer

permissions:
  furyspeedrunning.manage:
    description: Allows starting and stopping speedrun games
    default: op
  furyspeedrunning.admin:
    description: Allows admin utility commands
    default: op
  furyspeedrun.admin.timer:
    description: Allows starting and pausing the speedrun timer
    default: op
